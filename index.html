<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>August Wheel — Interactive Flag Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--panel:rgba(12,12,20,0.78);--border:rgba(255,255,255,0.08);
--text:#f0ede8;--muted:#7a7880;--accent:#39FF14;--accent2:#2BD610;
--glass-blur:28px;
}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;color:var(--text)}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}

/* ─── HEADER ─── */
.header{position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;
padding:24px 36px;display:flex;align-items:flex-start;justify-content:space-between}
.header-left{background:rgba(12,12,20,0.65);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 20px;
box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04)}
.header-left h1{font-size:11px;letter-spacing:5px;font-weight:600;color:var(--accent);text-transform:uppercase;opacity:0.95}
.header-left p{font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:5px;font-weight:400;opacity:0.7}
.header-right{text-align:right;opacity:0.5}
.header-right .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#39FF14;margin-right:6px;vertical-align:middle;
box-shadow:0 0 8px rgba(57,255,20,0.5)}
.header-right span{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}

/* ─── CONTROL PANEL ─── */
.controls{position:absolute;right:24px;top:50%;transform:translateY(-50%);z-index:10;
width:252px;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
border:1px solid var(--border);border-radius:16px;padding:22px 20px 18px;
box-shadow:0 12px 48px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04)}
.controls .section-title{font-size:8px;letter-spacing:3.5px;text-transform:uppercase;color:var(--accent);
margin-bottom:14px;font-weight:600;padding-bottom:8px;border-bottom:1px solid rgba(57,255,20,0.12)}
.ctrl-group{margin-bottom:10px}
.ctrl-group label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);
letter-spacing:0.6px;margin-bottom:4px;font-weight:400}
.ctrl-group label span{color:var(--text);font-variant-numeric:tabular-nums;font-weight:500;font-size:10px}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;border-radius:1px;
background:rgba(255,255,255,0.08);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
background:var(--accent);cursor:pointer;border:2px solid rgba(12,12,20,0.6);
box-shadow:0 0 8px rgba(57,255,20,0.3),0 2px 4px rgba(0,0,0,0.3)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
background:var(--accent);cursor:pointer;border:2px solid rgba(12,12,20,0.6)}

/* ─── PRESET BUTTONS ─── */
.preset-section{margin:14px 0 10px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.preset-btn{padding:7px 0;border:1px solid var(--border);border-radius:8px;
background:rgba(255,255,255,0.02);color:var(--muted);font-size:9px;letter-spacing:1px;
text-transform:uppercase;cursor:pointer;transition:all .25s;font-family:inherit;text-align:center}
.preset-btn:hover{background:rgba(57,255,20,0.08);color:var(--accent);border-color:rgba(57,255,20,0.15)}
.preset-btn.active{background:rgba(57,255,20,0.12);color:var(--accent);border-color:rgba(57,255,20,0.25);
box-shadow:0 0 12px rgba(57,255,20,0.08)}

/* ─── ACTION BUTTONS ─── */
.btn-row{display:flex;gap:6px;margin-top:6px}
.btn{flex:1;padding:8px 0;border:1px solid var(--border);border-radius:8px;
background:rgba(255,255,255,0.02);color:var(--muted);font-size:9px;letter-spacing:1.2px;
text-transform:uppercase;cursor:pointer;transition:all .25s;font-family:inherit;text-align:center}
.btn:hover{background:rgba(57,255,20,0.08);color:var(--accent);border-color:rgba(57,255,20,0.15)}
.btn.accent-btn{background:rgba(57,255,20,0.1);color:var(--accent);border-color:rgba(57,255,20,0.2)}
.btn.accent-btn:hover{background:rgba(57,255,20,0.18);box-shadow:0 0 16px rgba(57,255,20,0.12)}
.btn.accent-btn:active{transform:scale(0.97)}

.divider{height:1px;background:var(--border);margin:12px 0}

/* ─── FLAG STYLE SWATCHES ─── */
.flag-styles{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.flag-swatch{width:36px;height:24px;border-radius:6px;border:2px solid var(--border);
cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.flag-swatch:hover{border-color:rgba(57,255,20,0.3);transform:scale(1.1)}
.flag-swatch.active{border-color:var(--accent);box-shadow:0 0 10px rgba(57,255,20,0.2)}
.flag-swatch.checkered-swatch{
background:repeating-conic-gradient(#3C3C44 0% 25%, #0A0A10 0% 50%) 50%/10px 10px}
.flag-swatch-label{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
font-size:7px;letter-spacing:0.5px;color:var(--muted);white-space:nowrap;opacity:0;
transition:opacity .2s;pointer-events:none}
.flag-swatch:hover .flag-swatch-label{opacity:1}

/* ─── FOOTER ─── */
.footer{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
font-size:9px;letter-spacing:2.5px;color:var(--muted);opacity:0.5;pointer-events:auto;text-transform:uppercase}
.footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.15);
transition:all .25s;padding-bottom:1px}
.footer a:hover{color:var(--accent);border-bottom-color:rgba(57,255,20,0.3)}

/* ─── GRAB INDICATOR ─── */
#grab-indicator{position:absolute;width:32px;height:32px;border-radius:50%;
border:1.5px solid rgba(57,255,20,0.5);pointer-events:none;z-index:5;display:none;
transform:translate(-50%,-50%);box-shadow:0 0 16px rgba(57,255,20,0.15)}

/* ─── MOBILE RESPONSIVE ─── */
@media (max-width: 768px) {
  .header{padding:16px 20px}
  .header-left{padding:10px 14px}
  .header-left h1{font-size:10px;letter-spacing:4px}
  .header-left p{font-size:9px;letter-spacing:1.5px;margin-top:4px}
  .header-right{display:none}
  
  .controls{position:fixed;right:0;left:0;bottom:0;top:auto;transform:none;
    width:100%;max-height:70vh;border-radius:16px 16px 0 0;padding:16px 20px 20px;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    transition:transform 0.3s ease-out;
    box-shadow:0 -4px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.04)}
  .controls.hidden{transform:translateY(calc(100% - 60px))}
  
  .controls::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px}
  
  .ctrl-group label{font-size:12px}
  .ctrl-group label span{font-size:12px}
  input[type=range]{height:4px}
  input[type=range]::-webkit-slider-thumb{width:24px;height:24px}
  input[type=range]::-moz-range-thumb{width:24px;height:24px}
  
  .preset-btn{padding:12px 0;font-size:11px}
  .btn{padding:12px 0;font-size:11px}
  .flag-swatch{width:44px;height:32px}
  .flag-swatch-label{font-size:9px}
  
  .footer{bottom:80px;font-size:11px}
  
  #grab-indicator{width:48px;height:48px}
}

#mobile-toggle{display:none;position:fixed;bottom:20px;right:20px;z-index:20;
  width:56px;height:56px;border-radius:50%;border:none;
  background:var(--accent);color:#000;font-size:24px;cursor:pointer;
  box-shadow:0 4px 20px rgba(57,255,20,0.4);font-family:inherit;
  transition:all 0.3s}
#mobile-toggle:active{transform:scale(0.95)}

@media (max-width: 768px) {
  #mobile-toggle{display:block}
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="header">
<div class="header-left">
<h1>August Wheel — Interactive Flag Lab</h1>
<p>Drag the fabric · Tune the wind · Explore the physics</p>
</div>
<div class="header-right">
<span class="status-dot"></span><span id="status-text">WebGL Active</span>
</div>
</div>

<div class="controls">
<div class="section-title">Simulation</div>
<div class="ctrl-group"><label>Wind <span id="v-wind">5.0</span></label><input type="range" id="s-wind" min="0" max="30" step="0.1" value="5"></div>
<div class="ctrl-group"><label>Direction <span id="v-dir">0.00</span></label><input type="range" id="s-dir" min="-1" max="1" step="0.01" value="0"></div>
<div class="ctrl-group"><label>Turbulence <span id="v-turb">0.40</span></label><input type="range" id="s-turb" min="0" max="1" step="0.01" value="0.4"></div>
<div class="ctrl-group"><label>Gust <span id="v-gust">0.30</span></label><input type="range" id="s-gust" min="0" max="1" step="0.01" value="0.3"></div>
<div class="ctrl-group"><label>Stiffness <span id="v-stiff">0.80</span></label><input type="range" id="s-stiff" min="0.1" max="1" step="0.01" value="0.8"></div>
<div class="ctrl-group"><label>Damping <span id="v-damp">0.980</span></label><input type="range" id="s-damp" min="0.9" max="1" step="0.001" value="0.98"></div>
<div class="ctrl-group"><label>Gravity <span id="v-grav">0.40</span></label><input type="range" id="s-grav" min="0" max="1" step="0.01" value="0.4"></div>
<div class="ctrl-group"><label>Bend Resist <span id="v-bend">0.30</span></label><input type="range" id="s-bend" min="0" max="1" step="0.01" value="0.3"></div>

<div class="divider"></div>
<div class="section-title">Wind Presets</div>
<div class="preset-grid">
<button class="preset-btn" data-preset="calm">Calm Breeze</button>
<button class="preset-btn" data-preset="coastal">Coastal Flow</button>
<button class="preset-btn" data-preset="storm">Storm Pulse</button>
<button class="preset-btn active" data-preset="showcase">Showcase</button>
</div>

<div class="divider"></div>
<div class="btn-row">
<button class="btn accent-btn" id="btn-gust">⚡ Gust</button>
<button class="btn" id="btn-reset">Reset</button>
</div>
<div class="btn-row" style="margin-top:6px">
<button class="btn" id="btn-debug">Debug: Off</button>
<button class="btn" id="btn-quality">Quality: Hi</button>
</div>
<div class="btn-row" style="margin-top:6px">
<button class="btn" id="btn-orbit">Auto-Orbit: Off</button>
<button class="btn" id="btn-sound">🔇 Sound</button>
</div>

<div class="divider"></div>
<div class="section-title">Flag Style</div>
<div class="flag-styles" id="flag-styles"></div>
</div>

<div class="footer">WebGL Cloth Simulation · Vanilla JS · <a href="https://www.augustwheel.com" target="_blank" rel="noopener noreferrer">augustwheel.com</a></div>
<div id="grab-indicator"></div>
<button id="mobile-toggle">⚙</button>

<script>
"use strict";

// ─── MOBILE DETECTION ───
const isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

// ─── CONFIG ───
let COLS = isMobile ? 24 : 38, ROWS = isMobile ? 16 : 24;
const FLAG_W = 2.4, FLAG_H = 1.5;
const POLE_X = -1.3, POLE_TOP = 1.2, POLE_BOT = -1.4;

// ─── SIM PARAMS ───
const P = {
  wind: 5.0, dir: 0, turb: 0.4, gust: 0.3,
  stiff: 0.8, damp: 0.98, grav: 0.4, bend: 0.3
};

// ─── WIND PRESETS ───
const PRESETS = {
  calm:    { wind: 2.5, dir: 0,    turb: 0.15, gust: 0.1,  stiff: 0.85, damp: 0.985, grav: 0.4,  bend: 0.35 },
  coastal: { wind: 7.0, dir: 0.2,  turb: 0.35, gust: 0.4,  stiff: 0.75, damp: 0.975, grav: 0.35, bend: 0.25 },
  storm:   { wind: 18.0, dir: -0.3, turb: 0.8,  gust: 0.85, stiff: 0.6,  damp: 0.96,  grav: 0.5,  bend: 0.15 },
  showcase:{ wind: 5.0, dir: 0,    turb: 0.4,  gust: 0.3,  stiff: 0.8,  damp: 0.98,  grav: 0.4,  bend: 0.3  }
};

let gustPulse = 0;
let debugMode = false;

// ─── AUTO-ORBIT ───
let autoOrbit = false; // off by default, user can toggle
let lastInteractionTime = performance.now();
const ORBIT_IDLE_DELAY = 2000; // ms before auto-orbit starts
const ORBIT_SPEED = 0.08; // radians per second

// ─── SMOOTH PRESET TRANSITIONS ───
let targetP = null; // when set, P lerps toward this each frame
const PRESET_LERP_SPEED = 2.5; // per second (higher = faster)

// ─── INTRO UNFURL ───
let unfurlProgress = 0; // 0..1, ramps over ~3s
const UNFURL_DURATION = 3.0; // seconds
let unfurlStartTime = null; // set on first frame

// ─── MOUSE PROXIMITY WIND ───
let mouseWorldX = 0, mouseWorldY = 0;
let mouseActive = false;

// ─── SLIDER BINDINGS ───
const sliderKeys = [
  ['s-wind','v-wind','wind'],['s-dir','v-dir','dir'],['s-turb','v-turb','turb'],
  ['s-gust','v-gust','gust'],['s-stiff','v-stiff','stiff'],['s-damp','v-damp','damp'],
  ['s-grav','v-grav','grav'],['s-bend','v-bend','bend']
];
function syncSliders() {
  sliderKeys.forEach(([sid,vid,key]) => {
    const s = document.getElementById(sid), v = document.getElementById(vid);
    s.value = P[key];
    v.textContent = parseFloat(P[key]).toFixed(key==='damp'?3:key==='wind'?1:2);
  });
}
sliderKeys.forEach(([sid,vid,key]) => {
  const s = document.getElementById(sid), v = document.getElementById(vid);
  s.addEventListener('input', () => {
    P[key] = parseFloat(s.value);
    v.textContent = parseFloat(s.value).toFixed(key==='damp'?3:key==='wind'?1:2);
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  });
});

// ─── PRESET BUTTONS (smooth transition) ───
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = PRESETS[btn.dataset.preset];
    if (!p) return;
    targetP = { ...p };
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ─── GUST BUTTON ───
document.getElementById('btn-gust').addEventListener('click', () => {
  gustPulse = 1.0;
});

// ─── CANVAS / GL ───
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl', { antialias: true, alpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px">WebGL not supported</p>'; }

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', () => resize());
resize();

// ─── MATH UTILS ───
function mat4Perspective(fov, aspect, near, far) {
  const f = 1 / Math.tan(fov / 2), nf = 1 / (near - far);
  return new Float32Array([f/aspect,0,0,0, 0,f,0,0, 0,0,(far+near)*nf,-1, 0,0,2*far*near*nf,0]);
}
function mat4LookAt(eye, center, up) {
  let zx=eye[0]-center[0], zy=eye[1]-center[1], zz=eye[2]-center[2];
  let len=Math.sqrt(zx*zx+zy*zy+zz*zz); zx/=len; zy/=len; zz/=len;
  let xx=up[1]*zz-up[2]*zy, xy=up[2]*zx-up[0]*zz, xz=up[0]*zy-up[1]*zx;
  len=Math.sqrt(xx*xx+xy*xy+xz*xz); xx/=len; xy/=len; xz/=len;
  let yx=zy*xz-zz*xy, yy=zz*xx-zx*xz, yz=zx*xy-zy*xx;
  return new Float32Array([xx,yx,zx,0, xy,yy,zy,0, xz,yz,zz,0,
    -(xx*eye[0]+xy*eye[1]+xz*eye[2]),-(yx*eye[0]+yy*eye[1]+yz*eye[2]),-(zx*eye[0]+zy*eye[1]+zz*eye[2]),1]);
}
function mat4Multiply(a, b) {
  const o = new Float32Array(16);
  for (let i=0;i<4;i++) for (let j=0;j<4;j++) {
    o[j*4+i]=a[i]*b[j*4]+a[4+i]*b[j*4+1]+a[8+i]*b[j*4+2]+a[12+i]*b[j*4+3];
  }
  return o;
}
function vec3Normalize(v) {
  const l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]) || 1;
  return [v[0]/l, v[1]/l, v[2]/l];
}
function vec3Cross(a, b) {
  return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
}
function vec3Sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function vec3Dot(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function vec3Len(v) { return Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]); }

// ─── SHADERS ───
const clothVS = `
attribute vec3 aPos;
attribute vec3 aNorm;
attribute vec2 aUV;
uniform mat4 uProj;
uniform mat4 uView;
varying vec3 vNorm;
varying vec2 vUV;
varying vec3 vWorldPos;
void main(){
  vNorm = aNorm;
  vUV = aUV;
  vWorldPos = aPos;
  gl_Position = uProj * uView * vec4(aPos, 1.0);
}`;

const clothFS = `
precision mediump float;
varying vec3 vNorm;
varying vec2 vUV;
varying vec3 vWorldPos;
uniform sampler2D uTex;
uniform vec3 uEye;
uniform float uTime;

void main(){
  vec3 N = normalize(vNorm);
  vec3 V = normalize(uEye - vWorldPos);
  float NdotV = max(dot(N, V), 0.0);

  // ── Ambient — near zero so fabric reads as void black
  float ambient = 0.06;

  // ── Key light — front face
  vec3 L1 = normalize(vec3(0.5, 0.9, 0.6));
  float frontDiff = max(dot(N, L1), 0.0);
  frontDiff = frontDiff * frontDiff;
  vec3 H1 = normalize(L1 + V);
  float frontSpec = pow(max(dot(N, H1), 0.0), 100.0) * 0.25;

  // ── Key light — back face (reverse normal)
  float backDiff = max(dot(-N, L1), 0.0);
  backDiff = backDiff * backDiff;
  float backSpec = pow(max(dot(-N, H1), 0.0), 80.0) * 0.2;

  // ── Fill — near zero, symmetric
  vec3 L2 = normalize(vec3(-0.6, 0.2, 0.5));
  float fill = (max(dot(N, L2), 0.0) + max(dot(-N, L2), 0.0)) * 0.03;

  // ── Rim — edge glow, same both sides
  float rimDot = 1.0 - NdotV;
  float rim = pow(rimDot, 5.0) * 0.35;

  // ── Silk sheen — symmetric
  float faceLight = max(frontDiff, backDiff);
  float sheen = pow(rimDot, 3.0) * faceLight * 0.5;

  vec4 texColor = texture2D(uTex, vUV);

  // ═══ TEXTURE-BASED LIGHTING ═══
  // Bright texels (gold branding) get a gentle lift so they read clearly on dark fabric
  float lum = dot(texColor.rgb, vec3(0.299, 0.587, 0.114));
  float brandMask = smoothstep(0.15, 0.25, lum);

  // ── Fabric path: deeply black, lit by specular highlights only on folds
  vec3 fabricLight = vec3(1.0, 0.98, 0.94) * (frontDiff + backDiff) * 0.08
    + vec3(ambient)
    + vec3(fill);
  vec3 fabricCol = texColor.rgb * fabricLight;
  fabricCol += (frontSpec + backSpec) * vec3(0.9, 0.92, 0.95) * 0.35;
  fabricCol += rim * vec3(0.6, 0.62, 0.7) * 0.15;
  fabricCol += sheen * vec3(0.85, 0.87, 0.9) * 0.2;

  // ── Brand path: clean, crisp gold — no glow, just readable text
  vec3 brandCol = texColor.rgb * 1.1;

  // ── Blend fabric and branding based on mask
  vec3 col = mix(fabricCol, brandCol, brandMask);

  // Preserve deep blacks
  col = pow(col, vec3(0.95));

  gl_FragColor = vec4(col, 1.0);
}`;

const poleVS = `
attribute vec3 aPos;
attribute vec3 aNorm;
uniform mat4 uProj;
uniform mat4 uView;
varying vec3 vNorm;
varying vec3 vWorldPos;
void main(){
  vNorm = aNorm;
  vWorldPos = aPos;
  gl_Position = uProj * uView * vec4(aPos, 1.0);
}`;

const poleFS = `
precision mediump float;
varying vec3 vNorm;
varying vec3 vWorldPos;
uniform vec3 uEye;

void main(){
  vec3 N = normalize(vNorm);
  vec3 V = normalize(uEye - vWorldPos);

  // Key light
  vec3 L1 = normalize(vec3(0.6, 0.85, 0.5));
  float diff1 = max(dot(N, L1), 0.0);
  vec3 H1 = normalize(L1 + V);
  float spec1 = pow(max(dot(N, H1), 0.0), 64.0) * 0.55;

  // Fill light
  vec3 L2 = normalize(vec3(-0.7, 0.3, 0.4));
  float diff2 = max(dot(N, L2), 0.0);
  vec3 H2 = normalize(L2 + V);
  float spec2 = pow(max(dot(N, H2), 0.0), 48.0) * 0.2;

  // Rim
  float rim = pow(1.0 - max(dot(N, V), 0.0), 3.0) * 0.2;

  // Satin metallic base — brushed silver with warm tint
  vec3 baseCol = vec3(0.62, 0.6, 0.56);
  float envFake = 0.5 + 0.5 * N.y;
  vec3 envCol = mix(vec3(0.35, 0.33, 0.3), vec3(0.65, 0.62, 0.55), envFake);

  float ambient = 0.3;
  vec3 col = baseCol * (ambient + diff1 * 0.65 + diff2 * 0.25);
  col += envCol * 0.15;
  col += (spec1 + spec2) * vec3(1.0, 0.97, 0.9);
  col += rim * vec3(0.85, 0.82, 0.9);

  // Vertical brushed streaks
  float streak = 0.97 + 0.03 * sin(vWorldPos.y * 80.0);
  col *= streak;

  col = pow(col, vec3(0.95));
  gl_FragColor = vec4(col, 1.0);
}`;

const bgVS = `
attribute vec2 aPos;
varying vec2 vUV;
void main(){
  vUV = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.999, 1.0);
}`;

const bgFS = `
precision mediump float;
varying vec2 vUV;
uniform sampler2D uSkyTex;
uniform float uTime;
void main(){
  vec2 uv = vUV;
  // Slight slow drift for life
  uv.x += sin(uTime * 0.02) * 0.005;
  uv.y += cos(uTime * 0.015) * 0.003;
  uv = clamp(uv, 0.0, 1.0);

  vec3 sky = texture2D(uSkyTex, uv).rgb;

  // Cinematic overlay — darken slightly, add depth
  sky *= 0.82;

  // Vignette
  vec2 vc = vUV - 0.5;
  float vignette = 1.0 - dot(vc, vc) * 0.8;
  sky *= vignette;

  // Subtle color grade — warm shadows, cool highlights
  float lum = dot(sky, vec3(0.299, 0.587, 0.114));
  vec3 shadows = mix(sky, sky * vec3(1.05, 0.95, 0.88), (1.0 - lum) * 0.3);
  vec3 highlights = mix(shadows, shadows * vec3(0.92, 0.95, 1.05), lum * 0.2);

  gl_FragColor = vec4(highlights, 1.0);
}`;

const wireVS = `
attribute vec3 aPos;
uniform mat4 uProj;
uniform mat4 uView;
void main(){
  gl_Position = uProj * uView * vec4(aPos, 1.0);
}`;

const wireFS = `
precision mediump float;
void main(){
  gl_FragColor = vec4(0.4, 0.85, 0.5, 0.35);
}`;

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function createProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

const clothProg = createProgram(clothVS, clothFS);
const poleProg = createProgram(poleVS, poleFS);
const bgProg = createProgram(bgVS, bgFS);
const wireProg = createProgram(wireVS, wireFS);

const birdVS = `
attribute vec2 aPos;
uniform vec2 uBirdPos;
uniform float uWingAngle;
uniform float uScale;
uniform mat4 uProj;
uniform mat4 uView;
varying float vAlpha;

void main() {
  // aPos is a V-shape: center (0,0), left wing tip, right wing tip
  // Wing angle controls flap: positive = wings up, negative = wings down
  vec2 pos = aPos;
  if (pos.x < 0.0) {
    // Left wing
    pos.y += sin(uWingAngle) * 0.3;
  } else if (pos.x > 0.0) {
    // Right wing
    pos.y += sin(uWingAngle) * 0.3;
  }
  
  // Scale and position
  pos = pos * uScale + uBirdPos;
  
  // Depth for rendering (birds are far away)
  vec3 worldPos = vec3(pos, -8.0);
  
  // Fade with distance for atmosphere
  vAlpha = 0.6;
  
  gl_Position = uProj * uView * vec4(worldPos, 1.0);
}`;

varying float vAlpha;

void main() {

function makeFallbackSky() {
  const fc = document.createElement('canvas');

  sg.addColorStop(0.5, '#3d3555');
  sg.addColorStop(0.7, '#5a4a6a');
  sg.addColorStop(0.85, '#7a6070');
  sg.addColorStop(1, '#2a2030');
  fctx.fillStyle = sg;
  fctx.fillRect(0, 0, fc.width, fc.height);
  // Subtle warm glow
  const rg = fctx.createRadialGradient(fc.width*0.6, fc.height*0.4, 0, fc.width*0.5, fc.height*0.5, fc.width*0.5);
  rg.addColorStop(0, 'rgba(180,140,100,0.08)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  fctx.fillStyle = rg;
  fctx.fillRect(0, 0, fc.width, fc.height);
  return fc;
}

// ─── FLAG STYLE DEFINITIONS ───
const FLAG_STYLES = [
  { id: 'midnight',  name: 'Midnight',  color: '#1a1a2a' },
  { id: 'wine',      name: 'Wine',      color: '#5a1a2a' },
  { id: 'navy',      name: 'Navy',      color: '#1a2a4a' },
  { id: 'forest',    name: 'Forest',    color: '#1a3a2a' },
  { id: 'charcoal',  name: 'Charcoal',  color: '#3a3a3e' },
  { id: 'checkered', name: 'Racing',    color: '#2a2a2a' },
];
let activeFlagStyle = 0;

// ─── FLAG BASE PAINTERS ───
// Each paints the fabric background; branding is drawn on top separately.
function paintFlagBase(ctx, c, styleId) {
  if (styleId === 'midnight') {
    ctx.fillStyle = '#000003';
    ctx.fillRect(0, 0, c.width, c.height);
    const sg = ctx.createLinearGradient(0, 0, c.width * 0.7, c.height);
    sg.addColorStop(0, 'rgba(8,8,14,0)');
    sg.addColorStop(0.4, 'rgba(14,14,22,0.3)');
    sg.addColorStop(0.6, 'rgba(14,14,22,0.3)');
    sg.addColorStop(1, 'rgba(6,6,12,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, c.width, c.height);
  } else if (styleId === 'wine') {
    const wg = ctx.createLinearGradient(0, 0, c.width, c.height);
    wg.addColorStop(0, '#2D0A14');
    wg.addColorStop(0.3, '#3D1020');
    wg.addColorStop(0.7, '#4A1428');
    wg.addColorStop(1, '#2A0812');
    ctx.fillStyle = wg;
    ctx.fillRect(0, 0, c.width, c.height);
    // Silk sheen
    const sg = ctx.createLinearGradient(0, 0, c.width * 0.6, c.height);
    sg.addColorStop(0, 'rgba(80,20,40,0)');
    sg.addColorStop(0.45, 'rgba(90,25,50,0.25)');
    sg.addColorStop(0.55, 'rgba(90,25,50,0.25)');
    sg.addColorStop(1, 'rgba(60,15,30,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, c.width, c.height);
  } else if (styleId === 'navy') {
    const ng = ctx.createLinearGradient(0, 0, c.width, c.height);
    ng.addColorStop(0, '#060E1E');
    ng.addColorStop(0.3, '#0C1830');
    ng.addColorStop(0.7, '#101E38');
    ng.addColorStop(1, '#080F20');
    ctx.fillStyle = ng;
    ctx.fillRect(0, 0, c.width, c.height);
    const sg = ctx.createLinearGradient(0, 0, c.width * 0.6, c.height);
    sg.addColorStop(0, 'rgba(20,40,80,0)');
    sg.addColorStop(0.45, 'rgba(25,50,90,0.2)');
    sg.addColorStop(0.55, 'rgba(25,50,90,0.2)');
    sg.addColorStop(1, 'rgba(15,30,60,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, c.width, c.height);
  } else if (styleId === 'forest') {
    const fg = ctx.createLinearGradient(0, 0, c.width, c.height);
    fg.addColorStop(0, '#061408');
    fg.addColorStop(0.3, '#0C2210');
    fg.addColorStop(0.7, '#102A14');
    fg.addColorStop(1, '#08160A');
    ctx.fillStyle = fg;
    ctx.fillRect(0, 0, c.width, c.height);
    const sg = ctx.createLinearGradient(0, 0, c.width * 0.6, c.height);
    sg.addColorStop(0, 'rgba(20,60,25,0)');
    sg.addColorStop(0.45, 'rgba(25,70,30,0.2)');
    sg.addColorStop(0.55, 'rgba(25,70,30,0.2)');
    sg.addColorStop(1, 'rgba(15,45,20,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, c.width, c.height);
  } else if (styleId === 'charcoal') {
    const cg = ctx.createLinearGradient(0, 0, c.width, c.height);
    cg.addColorStop(0, '#1A1A1E');
    cg.addColorStop(0.5, '#222226');
    cg.addColorStop(1, '#18181C');
    ctx.fillStyle = cg;
    ctx.fillRect(0, 0, c.width, c.height);
  } else if (styleId === 'checkered') {
    ctx.fillStyle = '#0A0A10';
    ctx.fillRect(0, 0, c.width, c.height);
    // Racing squares — high contrast, clearly visible
    const sq = 56;
    for (let y = 0; y < c.height; y += sq) {
      for (let x = 0; x < c.width; x += sq) {
        if (((x / sq) + (y / sq)) % 2 === 0) {
          ctx.fillStyle = '#3C3C44'; // clearly lighter than dark squares
          ctx.fillRect(x, y, sq, sq);
        }
      }
    }
  }

  // Universal micro-texture (fabric weave)
  ctx.save();
  ctx.globalAlpha = 0.015;
  for (let y = 0; y < c.height; y += 3) {
    for (let x = 0; x < c.width; x += 3) {
      if (Math.random() > 0.6) {
        ctx.fillStyle = Math.random() > 0.5 ? '#0e0e14' : '#040408';
        ctx.fillRect(x, y, 3, 3);
      }
    }
  }
  ctx.restore();
}

function generateFlagTexture(styleId) {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 640;
  const ctx = c.getContext('2d');

  // ─── Paint fabric base for this style ───
  paintFlagBase(ctx, c, styleId);

  // White accent — crisp, clean
  const gold = '#FFFFFF';
  const goldDark = '#CCCCCC';
  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = gold;
  ctx.fillRect(0, 28, c.width, 2);
  ctx.fillRect(0, c.height - 30, c.width, 2);
  ctx.restore();

  // Accent stripe near pole edge
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = gold;
  ctx.fillRect(48, 0, 2, c.height);
  ctx.restore();

  // ─── AW Monogram (large, centered) ───
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.globalAlpha = 0.85;
  ctx.strokeStyle = gold;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(c.width * 0.5, c.height * 0.42, 95, 0, Math.PI * 2);
  ctx.stroke();

  ctx.globalAlpha = 0.5;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(c.width * 0.5, c.height * 0.42, 82, 0, Math.PI * 2);
  ctx.stroke();

  ctx.globalAlpha = 1.0;
  ctx.font = '700 80px -apple-system, "Helvetica Neue", sans-serif';
  ctx.fillStyle = gold;
  ctx.fillText('AW', c.width * 0.5, c.height * 0.43);
  ctx.restore();

  // ─── AUGUST WHEEL wordmark ───
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 1.0;
  ctx.font = '600 32px -apple-system, "Helvetica Neue", sans-serif';
  ctx.fillStyle = gold;
  ctx.fillText('A U G U S T   W H E E L', c.width * 0.5, c.height * 0.72);
  ctx.restore();

  // Subtitle
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 0.8;

  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(28, 55); ctx.lineTo(28, 28); ctx.lineTo(55, 28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(c.width-55, 28); ctx.lineTo(c.width-28, 28); ctx.lineTo(c.width-28, 55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(28, c.height-55); ctx.lineTo(28, c.height-28); ctx.lineTo(55, c.height-28); ctx.stroke();

  ctx.restore();

  return c;
}

function uploadFlagTexture(canvas) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, canvas);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return tex;
}

// ─── CLOTH SIMULATION ───
let particles = [];
let constraints = [];
let grabIdx = -1;
let grabTarget = [0,0,0];

function initCloth() {
  particles = [];
  constraints = [];
  grabIdx = -1;

  const spacingX = FLAG_W / (COLS - 1);
  const spacingY = FLAG_H / (ROWS - 1);
  const startY = POLE_TOP;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = POLE_X + c * spacingX;
      const y = startY - r * spacingY;
      const z = 0;
      particles.push({
        x, y, z,
        ox: x, oy: y, oz: z,
        pinned: c === 0
      });
    }
  }

  // Structural constraints
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      if (c < COLS - 1) constraints.push({ a: idx, b: idx + 1, rest: spacingX, type: 'struct' });
      if (r < ROWS - 1) constraints.push({ a: idx, b: idx + COLS, rest: spacingY, type: 'struct' });
    }
  }

  // Shear constraints
  const diagLen = Math.sqrt(spacingX * spacingX + spacingY * spacingY);
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const idx = r * COLS + c;
      constraints.push({ a: idx, b: idx + COLS + 1, rest: diagLen, type: 'shear' });
      constraints.push({ a: idx + 1, b: idx + COLS, rest: diagLen, type: 'shear' });
    }
  }

  // Bend constraints
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const idx = r * COLS + c;
      constraints.push({ a: idx, b: idx + 2, rest: spacingX * 2, type: 'bend' });
    }
  }
  for (let r = 0; r < ROWS - 2; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      constraints.push({ a: idx, b: idx + COLS * 2, rest: spacingY * 2, type: 'bend' });
    }
  }
}

function simulateCloth(dt) {
  const gravity = -P.grav * 9.8;
  const windBase = (P.wind + gustPulse * 25.0) * unfurlProgress;
  const turb = P.turb + gustPulse * 0.5;
  const gustStr = P.gust + gustPulse * 0.6;
  const damp = P.damp;
  const stiff = P.stiff;
  const bendRes = P.bend;
  const t = performance.now() * 0.001;

  // Decay gust pulse
  gustPulse *= 0.96;
  if (gustPulse < 0.001) gustPulse = 0;

  // Apply forces and integrate
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.pinned && grabIdx !== i) continue;
    if (i === grabIdx) continue;

    const gust = Math.sin(t * 1.3 + p.x * 2.0) * Math.cos(t * 0.7 + p.y * 1.5) * gustStr;
    const turbX = Math.sin(t * 3.1 + p.y * 4.0 + p.x * 2.0) * turb * 0.4;
    const turbY = Math.cos(t * 2.7 + p.x * 3.0 + p.y * 1.5) * turb * 0.2;
    const turbZ = Math.sin(t * 4.0 + p.x * 5.0) * turb * 0.6;

    const windX = (windBase + gust) * (1.0 + P.dir * 0.5);
    const windZ = (windBase + gust) * (0.8 + Math.sin(t * 0.5) * 0.3);
    const windY = turbY * windBase;

    let ax = (windX + turbX) * 1.2;
    let ay = gravity + windY;
    let az = (windZ + turbZ) * 1.0;

    // Mouse proximity wind — push cloth away from cursor
    if (mouseActive && !mouseDown) {
      const dx = p.x - mouseWorldX;
      const dy = p.y - mouseWorldY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const radius = 0.8;
      if (dist < radius) {
        const strength = (1.0 - dist / radius) * 12.0;
        az += strength * 1.5; // push forward (toward camera)
        ax += dx * strength * 0.3;
        ay += dy * strength * 0.3;
      }
    }

    const vx = (p.x - p.ox) * damp;
    const vy = (p.y - p.oy) * damp;
    const vz = (p.z - p.oz) * damp;

    p.ox = p.x;
    p.oy = p.y;
    p.oz = p.z;

    p.x += vx + ax * dt * dt;
    p.y += vy + ay * dt * dt;
    p.z += vz + az * dt * dt;
  }

  // Move grabbed particle
  if (grabIdx >= 0 && grabIdx < particles.length) {
    const p = particles[grabIdx];
    p.x = grabTarget[0];
    p.y = grabTarget[1];
    p.z = grabTarget[2];
  }

  // Solve constraints
  const iterations = Math.round(6 + stiff * 8);
  for (let iter = 0; iter < iterations; iter++) {
    for (let i = 0; i < constraints.length; i++) {
      const c = constraints[i];
      const pa = particles[c.a];
      const pb = particles[c.b];
      const dx = pb.x - pa.x;
      const dy = pb.y - pa.y;
      const dz = pb.z - pa.z;
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 0.0001;

      let stiffness = stiff;
      if (c.type === 'bend') stiffness *= bendRes;
      if (c.type === 'shear') stiffness *= 0.8;

      const diff = (dist - c.rest) / dist * stiffness * 0.5;
      const ox = dx * diff;
      const oy = dy * diff;
      const oz = dz * diff;

      if (!pa.pinned || grabIdx === c.a) { pa.x += ox; pa.y += oy; pa.z += oz; }
      if (!pb.pinned || grabIdx === c.b) { pb.x -= ox; pb.y -= oy; pb.z -= oz; }
    }
  }

  // Keep pinned edge on pole
  for (let r = 0; r < ROWS; r++) {
    const p = particles[r * COLS];
    p.x = POLE_X;
    p.y = POLE_TOP - r * (FLAG_H / (ROWS - 1));
    p.z = 0;
  }
}

// ─── MESH BUFFERS ───
let clothPosBuf = gl.createBuffer();
let clothNormBuf = gl.createBuffer();
let clothUVBuf = gl.createBuffer();
let clothIdxBuf = gl.createBuffer();

function buildClothMesh() {
  const uvs = [];
  const indices = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      uvs.push(c / (COLS - 1), r / (ROWS - 1));
    }
  }
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const i = r * COLS + c;
      indices.push(i, i + 1, i + COLS);
      indices.push(i + 1, i + COLS + 1, i + COLS);
    }
  }

  gl.bindBuffer(gl.ARRAY_BUFFER, clothUVBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(uvs), gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, clothIdxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);
}

function updateClothBuffers() {
  const pos = new Float32Array(particles.length * 3);
  const norms = new Float32Array(particles.length * 3);

  for (let i = 0; i < particles.length; i++) {
    pos[i * 3] = particles[i].x;
    pos[i * 3 + 1] = particles[i].y;
    pos[i * 3 + 2] = particles[i].z;
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      let nx = 0, ny = 0, nz = 0;

      const getPos = (rr, cc) => {
        const ii = rr * COLS + cc;
        return [particles[ii].x, particles[ii].y, particles[ii].z];
      };

      const p0 = getPos(r, c);
      if (c < COLS - 1 && r < ROWS - 1) {
        const p1 = getPos(r, c + 1);
        const p2 = getPos(r + 1, c);
        const e1 = vec3Sub(p1, p0);
        const e2 = vec3Sub(p2, p0);
        const n = vec3Cross(e1, e2);
        nx += n[0]; ny += n[1]; nz += n[2];
      }
      if (c > 0 && r < ROWS - 1) {
        const p1 = getPos(r + 1, c);
        const p2 = getPos(r, c - 1);
        const e1 = vec3Sub(p1, p0);
        const e2 = vec3Sub(p2, p0);
        const n = vec3Cross(e1, e2);
        nx += n[0]; ny += n[1]; nz += n[2];
      }
      if (c > 0 && r > 0) {
        const p1 = getPos(r, c - 1);
        const p2 = getPos(r - 1, c);
        const e1 = vec3Sub(p1, p0);
        const e2 = vec3Sub(p2, p0);
        const n = vec3Cross(e1, e2);
        nx += n[0]; ny += n[1]; nz += n[2];
      }
      if (c < COLS - 1 && r > 0) {
        const p1 = getPos(r - 1, c);
        const p2 = getPos(r, c + 1);
        const e1 = vec3Sub(p1, p0);
        const e2 = vec3Sub(p2, p0);
        const n = vec3Cross(e1, e2);
        nx += n[0]; ny += n[1]; nz += n[2];
      }

      const len = Math.sqrt(nx*nx+ny*ny+nz*nz) || 1;
      norms[idx * 3] = nx / len;
      norms[idx * 3 + 1] = ny / len;
      norms[idx * 3 + 2] = nz / len;
    }
  }

  gl.bindBuffer(gl.ARRAY_BUFFER, clothPosBuf);
  gl.bufferData(gl.ARRAY_BUFFER, pos, gl.DYNAMIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, clothNormBuf);
  gl.bufferData(gl.ARRAY_BUFFER, norms, gl.DYNAMIC_DRAW);
}

// ─── POLE GEOMETRY ───
let polePosBuf, poleNormBuf, poleIdxBuf, poleIdxCount;

function buildPole() {
  const segs = 16;
  const radius = 0.035;
  const top = POLE_TOP + 0.15;
  const bot = POLE_BOT - 0.3;
  const pos = [], norm = [], idx = [];

  for (let i = 0; i <= segs; i++) {
    const a = (i / segs) * Math.PI * 2;
    const nx = Math.cos(a), nz = Math.sin(a);
    const x = POLE_X + nx * radius, z = nz * radius;
    pos.push(x, top, z); norm.push(nx, 0, nz);
    pos.push(x, bot, z); norm.push(nx, 0, nz);
  }
  for (let i = 0; i < segs; i++) {
    const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
    idx.push(a, c, b, b, c, d);
  }

  // Pole cap
  const capIdx = pos.length / 3;
  pos.push(POLE_X, top + radius, 0); norm.push(0, 1, 0);
  for (let i = 0; i <= segs; i++) {
    const a = (i / segs) * Math.PI * 2;
    pos.push(POLE_X + Math.cos(a) * radius, top, Math.sin(a) * radius);
    norm.push(Math.cos(a) * 0.5, 0.866, Math.sin(a) * 0.5);
  }
  for (let i = 0; i < segs; i++) {
    idx.push(capIdx, capIdx + 1 + i, capIdx + 2 + i);
  }

  // Decorative finial ball
  const ballIdx = pos.length / 3;
  const ballR = 0.055;
  const ballY = top + radius + ballR * 0.8;
  const ballSegs = 10;
  const ballRings = 8;
  for (let ring = 0; ring <= ballRings; ring++) {
    const phi = (ring / ballRings) * Math.PI;
    for (let seg = 0; seg <= ballSegs; seg++) {
      const theta = (seg / ballSegs) * Math.PI * 2;
      const nx2 = Math.sin(phi) * Math.cos(theta);
      const ny2 = Math.cos(phi);
      const nz2 = Math.sin(phi) * Math.sin(theta);
      pos.push(POLE_X + nx2 * ballR, ballY + ny2 * ballR, nz2 * ballR);
      norm.push(nx2, ny2, nz2);
    }
  }
  for (let ring = 0; ring < ballRings; ring++) {
    for (let seg = 0; seg < ballSegs; seg++) {
      const a2 = ballIdx + ring * (ballSegs + 1) + seg;
      const b2 = a2 + ballSegs + 1;
      idx.push(a2, b2, a2 + 1, a2 + 1, b2, b2 + 1);
    }
  }

  polePosBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, polePosBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(pos), gl.STATIC_DRAW);
  poleNormBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, poleNormBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(norm), gl.STATIC_DRAW);
  poleIdxBuf = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, poleIdxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(idx), gl.STATIC_DRAW);
  poleIdxCount = idx.length;
}

const bgPosBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, bgPosBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

// ─── CAMERA ───
let camAngleX = 0.15, camAngleY = -0.2;
let camDist = 4.2;
let isOrbiting = false, orbitStart = [0,0];

function getCamEye() {
  return [
    Math.sin(camAngleY) * Math.cos(camAngleX) * camDist,
    Math.sin(camAngleX) * camDist + 0.1,
    Math.cos(camAngleY) * Math.cos(camAngleX) * camDist
  ];
}

// ─── MOUSE INTERACTION ───
const grabIndicator = document.getElementById('grab-indicator');
let mouseDown = false, isDraggingCloth = false;
let mouseX = 0, mouseY = 0;

function screenToWorld(sx, sy, eye, view, proj) {
  const ndcX = (sx / canvas.clientWidth) * 2 - 1;
  const ndcY = 1 - (sy / canvas.clientHeight) * 2;
  const invVP = invertMat4(mat4Multiply(proj, view));
  const nearPt = mulMat4Vec4(invVP, [ndcX, ndcY, -1, 1]);
  const farPt = mulMat4Vec4(invVP, [ndcX, ndcY, 1, 1]);
  const near3 = [nearPt[0]/nearPt[3], nearPt[1]/nearPt[3], nearPt[2]/nearPt[3]];
  const far3 = [farPt[0]/farPt[3], farPt[1]/farPt[3], farPt[2]/farPt[3]];
  return { origin: near3, dir: vec3Normalize(vec3Sub(far3, near3)) };
}

function invertMat4(m) {
  const inv = new Float32Array(16);
  inv[0] = m[5]*m[10]*m[15]-m[5]*m[11]*m[14]-m[9]*m[6]*m[15]+m[9]*m[7]*m[14]+m[13]*m[6]*m[11]-m[13]*m[7]*m[10];
  inv[4] = -m[4]*m[10]*m[15]+m[4]*m[11]*m[14]+m[8]*m[6]*m[15]-m[8]*m[7]*m[14]-m[12]*m[6]*m[11]+m[12]*m[7]*m[10];
  inv[8] = m[4]*m[9]*m[15]-m[4]*m[11]*m[13]-m[8]*m[5]*m[15]+m[8]*m[7]*m[13]+m[12]*m[5]*m[11]-m[12]*m[7]*m[9];
  inv[12] = -m[4]*m[9]*m[14]+m[4]*m[10]*m[13]+m[8]*m[5]*m[14]-m[8]*m[6]*m[13]-m[12]*m[5]*m[10]+m[12]*m[6]*m[9];
  inv[1] = -m[1]*m[10]*m[15]+m[1]*m[11]*m[14]+m[9]*m[2]*m[15]-m[9]*m[3]*m[14]-m[13]*m[2]*m[11]+m[13]*m[3]*m[10];
  inv[5] = m[0]*m[10]*m[15]-m[0]*m[11]*m[14]-m[8]*m[2]*m[15]+m[8]*m[3]*m[14]+m[12]*m[2]*m[11]-m[12]*m[3]*m[10];
  inv[9] = -m[0]*m[9]*m[15]+m[0]*m[11]*m[13]+m[8]*m[1]*m[15]-m[8]*m[3]*m[13]-m[12]*m[1]*m[11]+m[12]*m[3]*m[9];
  inv[13] = m[0]*m[9]*m[14]-m[0]*m[10]*m[13]-m[8]*m[1]*m[14]+m[8]*m[2]*m[13]+m[12]*m[1]*m[10]-m[12]*m[2]*m[9];
  inv[2] = m[1]*m[6]*m[15]-m[1]*m[7]*m[14]-m[5]*m[2]*m[15]+m[5]*m[3]*m[14]+m[13]*m[2]*m[7]-m[13]*m[3]*m[6];
  inv[6] = -m[0]*m[6]*m[15]+m[0]*m[7]*m[14]+m[4]*m[2]*m[15]-m[4]*m[3]*m[14]-m[12]*m[2]*m[7]+m[12]*m[3]*m[6];
  inv[10] = m[0]*m[5]*m[15]-m[0]*m[7]*m[13]-m[4]*m[1]*m[15]+m[4]*m[3]*m[13]+m[12]*m[1]*m[7]-m[12]*m[3]*m[5];
  inv[14] = -m[0]*m[5]*m[14]+m[0]*m[6]*m[13]+m[4]*m[1]*m[14]-m[4]*m[2]*m[13]-m[12]*m[1]*m[6]+m[12]*m[2]*m[5];
  inv[3] = -m[1]*m[6]*m[11]+m[1]*m[7]*m[10]+m[5]*m[2]*m[11]-m[5]*m[3]*m[10]-m[9]*m[2]*m[7]+m[9]*m[3]*m[6];
  inv[7] = m[0]*m[6]*m[11]-m[0]*m[7]*m[10]-m[4]*m[2]*m[11]+m[4]*m[3]*m[10]+m[8]*m[2]*m[7]-m[8]*m[3]*m[6];
  inv[11] = -m[0]*m[5]*m[11]+m[0]*m[7]*m[9]+m[4]*m[1]*m[11]-m[4]*m[3]*m[9]-m[8]*m[1]*m[7]+m[8]*m[3]*m[5];
  inv[15] = m[0]*m[5]*m[10]-m[0]*m[6]*m[9]-m[4]*m[1]*m[10]+m[4]*m[2]*m[9]+m[8]*m[1]*m[6]-m[8]*m[2]*m[5];
  let det = m[0]*inv[0]+m[1]*inv[4]+m[2]*inv[8]+m[3]*inv[12];
  if (det === 0) return new Float32Array(16);
  det = 1.0 / det;
  for (let i = 0; i < 16; i++) inv[i] *= det;
  return inv;
}

function mulMat4Vec4(m, v) {
  return [
    m[0]*v[0]+m[4]*v[1]+m[8]*v[2]+m[12]*v[3],
    m[1]*v[0]+m[5]*v[1]+m[9]*v[2]+m[13]*v[3],
    m[2]*v[0]+m[6]*v[1]+m[10]*v[2]+m[14]*v[3],
    m[3]*v[0]+m[7]*v[1]+m[11]*v[2]+m[15]*v[3]
  ];
}

function findClosestParticle(sx, sy, view, proj) {
  const eye = getCamEye();
  const ray = screenToWorld(sx, sy, eye, view, proj);
  let bestDist = 0.15;
  let bestIdx = -1;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const pp = [p.x, p.y, p.z];
    const op = vec3Sub(pp, ray.origin);
    const t = vec3Dot(op, ray.dir);
    if (t < 0) continue;
    const closest = [ray.origin[0]+ray.dir[0]*t, ray.origin[1]+ray.dir[1]*t, ray.origin[2]+ray.dir[2]*t];
    const d = vec3Len(vec3Sub(pp, closest));
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  return bestIdx;
}

function projectToPlane(sx, sy, view, proj, targetParticle) {
  const eye = getCamEye();
  const ray = screenToWorld(sx, sy, eye, view, proj);
  const p = particles[targetParticle];
  const planeN = [0, 0, 1];
  const planeD = -vec3Dot([p.x, p.y, p.z], planeN);
  const denom = vec3Dot(ray.dir, planeN);
  if (Math.abs(denom) < 1e-8) return [p.x, p.y, p.z];
  const t = -(vec3Dot(ray.origin, planeN) + planeD) / denom;
  return [
    ray.origin[0] + ray.dir[0] * t,
    ray.origin[1] + ray.dir[1] * t,
    ray.origin[2] + ray.dir[2] * t
  ];
}

canvas.addEventListener('mousedown', (e) => {
  lastInteractionTime = performance.now();
  targetP = null; // cancel smooth transition if user interacts
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const eye = getCamEye();
  const view = mat4LookAt(eye, [0, 0, 0], [0, 1, 0]);
  const aspect = canvas.width / canvas.height;
  const proj = mat4Perspective(Math.PI / 5, aspect, 0.1, 50);

  const idx = findClosestParticle(sx, sy, view, proj);
  if (idx >= 0) {
    grabIdx = idx;
    isDraggingCloth = true;
    grabTarget = projectToPlane(sx, sy, view, proj, idx);
    grabIndicator.style.display = 'block';
    grabIndicator.style.left = e.clientX + 'px';
    grabIndicator.style.top = e.clientY + 'px';
  } else {
    isOrbiting = true;
    orbitStart = [e.clientX, e.clientY];
  }
  mouseDown = true;
});

canvas.addEventListener('mousemove', (e) => {
  lastInteractionTime = performance.now();
  mouseActive = true;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

  // Project mouse to world-space plane at z=0 for proximity wind
  const eye = getCamEye();
  const view = mat4LookAt(eye, [0, 0, 0], [0, 1, 0]);
  const aspect = canvas.width / canvas.height;
  const proj = mat4Perspective(Math.PI / 5, aspect, 0.1, 50);
  const ndcX = (sx / canvas.clientWidth) * 2 - 1;
  const ndcY = 1 - (sy / canvas.clientHeight) * 2;
  const invVP = invertMat4(mat4Multiply(proj, view));
  const nearPt = mulMat4Vec4(invVP, [ndcX, ndcY, -1, 1]);
  const farPt = mulMat4Vec4(invVP, [ndcX, ndcY, 1, 1]);
  const near3 = [nearPt[0]/nearPt[3], nearPt[1]/nearPt[3], nearPt[2]/nearPt[3]];
  const far3 = [farPt[0]/farPt[3], farPt[1]/farPt[3], farPt[2]/farPt[3]];
  const dir = vec3Normalize(vec3Sub(far3, near3));
  // Intersect with z=0 plane
  const denom = dir[2];
  if (Math.abs(denom) > 1e-6) {
    const t = -near3[2] / denom;
    mouseWorldX = near3[0] + dir[0] * t;
    mouseWorldY = near3[1] + dir[1] * t;
  }

  if (mouseDown) {
    if (isDraggingCloth && grabIdx >= 0) {
      const eye2 = getCamEye();
      const view2 = mat4LookAt(eye2, [0, 0, 0], [0, 1, 0]);
      const aspect2 = canvas.width / canvas.height;
      const proj2 = mat4Perspective(Math.PI / 5, aspect2, 0.1, 50);
      grabTarget = projectToPlane(sx, sy, view2, proj2, grabIdx);
      grabIndicator.style.left = e.clientX + 'px';
      grabIndicator.style.top = e.clientY + 'px';
    } else if (isOrbiting) {
      const dx = (e.clientX - orbitStart[0]) * 0.005;
      const dy = (e.clientY - orbitStart[1]) * 0.005;
      camAngleY += dx;
      camAngleX = Math.max(-0.6, Math.min(0.6, camAngleX + dy));
      orbitStart = [e.clientX, e.clientY];
    }
  }
  mouseX = e.clientX; mouseY = e.clientY;
});

canvas.addEventListener('mouseleave', () => { mouseActive = false; });

window.addEventListener('mouseup', () => {
  mouseDown = false;
  isDraggingCloth = false;
  isOrbiting = false;
  grabIdx = -1;
  grabIndicator.style.display = 'none';
});

// ─── BLOOM POST-PROCESS ───
const bloomVS = `
attribute vec2 aPos;
varying vec2 vUV;
void main(){
  vUV = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const bloomExtractFS = `
precision mediump float;
varying vec2 vUV;
uniform sampler2D uTex;
uniform float uThreshold;
void main(){
  vec4 col = texture2D(uTex, vUV);
  float lum = dot(col.rgb, vec3(0.299, 0.587, 0.114));
  float mask = smoothstep(uThreshold, uThreshold + 0.15, lum);
  gl_FragColor = vec4(col.rgb * mask, 1.0);
}`;

const bloomBlurFS = `
precision mediump float;
varying vec2 vUV;
uniform sampler2D uTex;
uniform vec2 uDir;
uniform vec2 uResolution;
void main(){
  vec2 texel = uDir / uResolution;
  vec4 sum = texture2D(uTex, vUV) * 0.227027;
  sum += texture2D(uTex, vUV + texel * 1.384615) * 0.316217;
  sum += texture2D(uTex, vUV - texel * 1.384615) * 0.316217;
  sum += texture2D(uTex, vUV + texel * 3.230769) * 0.070270;
  sum += texture2D(uTex, vUV - texel * 3.230769) * 0.070270;
  gl_FragColor = sum;
}`;

const bloomCompositeFS = `
precision mediump float;
varying vec2 vUV;
uniform sampler2D uScene;
uniform sampler2D uBloom;
uniform float uBloomStrength;
void main(){
  vec3 scene = texture2D(uScene, vUV).rgb;
  vec3 bloom = texture2D(uBloom, vUV).rgb;
  vec3 col = scene + bloom * uBloomStrength;
  // Subtle film grain
  float grain = (fract(sin(dot(vUV * 1000.0, vec2(12.9898, 78.233))) * 43758.5453) - 0.5) * 0.015;
  col += grain;
  gl_FragColor = vec4(col, 1.0);
}`;

const bloomExtractProg = createProgram(bloomVS, bloomExtractFS);
const bloomBlurProg = createProgram(bloomVS, bloomBlurFS);
const bloomCompositeProg = createProgram(bloomVS, bloomCompositeFS);

function createFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fb, tex, w, h };
}

let sceneFBO, bloomFBO1, bloomFBO2;
const bloomQuadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, bloomQuadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function initBloomFBOs() {

  const bh = Math.floor(canvas.height / 2);

}

// ─── WIND AUDIO ENGINE ───
let audioCtx = null;
let audioEnabled = false;
let audioNodes = null;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const sr = audioCtx.sampleRate;
  const bufLen = sr * 2;

  // Generate brown noise buffer
  const brownBuf = audioCtx.createBuffer(1, bufLen, sr);
  const brownData = brownBuf.getChannelData(0);
  let lastOut = 0;
  for (let i = 0; i < bufLen; i++) {
    const white = Math.random() * 2 - 1;
    lastOut = (lastOut + 0.02 * white) / 1.02;
    brownData[i] = lastOut * 3.5;
  }

  // Generate pink noise buffer (for turbulence layer)
  const pinkBuf = audioCtx.createBuffer(1, bufLen, sr);
  const pinkData = pinkBuf.getChannelData(0);
  let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
  for (let i = 0; i < bufLen; i++) {
    const white = Math.random() * 2 - 1;
    b0 = 0.99886 * b0 + white * 0.0555179;
    b1 = 0.99332 * b1 + white * 0.0750759;
    b2 = 0.96900 * b2 + white * 0.1538520;
    b3 = 0.86650 * b3 + white * 0.3104856;
    b4 = 0.55000 * b4 + white * 0.5329522;
    b5 = -0.7616 * b5 - white * 0.0168980;
    pinkData[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
    b6 = white * 0.115926;
  }

  // Master gain
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);

  // ── Main wind: brown noise through bandpass ──
  const windSource = audioCtx.createBufferSource();
  windSource.buffer = brownBuf;
  windSource.loop = true;
  const windBP = audioCtx.createBiquadFilter();
  windBP.type = 'bandpass';
  windBP.frequency.value = 200;
  windBP.Q.value = 0.5;
  const windGain = audioCtx.createGain();
  windGain.gain.value = 0.6;
  windSource.connect(windBP);
  windBP.connect(windGain);
  windGain.connect(masterGain);
  windSource.start();

  // ── Low rumble: brown noise through lowpass ──
  const rumbleSource = audioCtx.createBufferSource();
  rumbleSource.buffer = brownBuf;
  rumbleSource.loop = true;
  const rumbleLP = audioCtx.createBiquadFilter();
  rumbleLP.type = 'lowpass';
  rumbleLP.frequency.value = 80;
  rumbleLP.Q.value = 1.0;
  const rumbleGain = audioCtx.createGain();
  rumbleGain.gain.value = 0.3;
  rumbleSource.connect(rumbleLP);
  rumbleLP.connect(rumbleGain);
  rumbleGain.connect(masterGain);
  rumbleSource.start();

  // ── Turbulence: pink noise through bandpass (higher freq) ──
  const turbSource = audioCtx.createBufferSource();
  turbSource.buffer = pinkBuf;
  turbSource.loop = true;
  const turbBP = audioCtx.createBiquadFilter();
  turbBP.type = 'bandpass';
  turbBP.frequency.value = 800;
  turbBP.Q.value = 0.8;
  const turbGain = audioCtx.createGain();
  turbGain.gain.value = 0;
  turbSource.connect(turbBP);
  turbBP.connect(turbGain);
  turbGain.connect(masterGain);
  turbSource.start();

  // ── High whistle: pink noise through narrow bandpass ──
  const whistleSource = audioCtx.createBufferSource();
  whistleSource.buffer = pinkBuf;
  whistleSource.loop = true;
  const whistleBP = audioCtx.createBiquadFilter();
  whistleBP.type = 'bandpass';
  whistleBP.frequency.value = 2000;
  whistleBP.Q.value = 5.0;
  const whistleGain = audioCtx.createGain();
  whistleGain.gain.value = 0;
  whistleSource.connect(whistleBP);
  whistleBP.connect(whistleGain);
  whistleGain.connect(masterGain);
  whistleSource.start();

  audioNodes = { masterGain, windBP, windGain, rumbleGain, turbBP, turbGain, whistleBP, whistleGain };
}

function updateAudio() {
  if (!audioEnabled || !audioNodes) return;
  const t = audioCtx.currentTime;
  const n = audioNodes;

  // Wind speed drives overall volume and low-mid frequency shift
  const windNorm = Math.min(P.wind / 30, 1); // 0..1
  const masterVol = 0.05 + windNorm * 0.35;
  n.masterGain.gain.setTargetAtTime(masterVol, t, 0.1);

  // Wind speed shifts bandpass center frequency
  const windFreq = 120 + windNorm * 350;
  n.windBP.frequency.setTargetAtTime(windFreq, t, 0.1);

  // Rumble grows with wind
  n.rumbleGain.gain.setTargetAtTime(0.1 + windNorm * 0.4, t, 0.1);

  // Turbulence layer scales with P.turb
  const turbVol = P.turb * 0.25;
  n.turbGain.gain.setTargetAtTime(turbVol, t, 0.05);
  // Shift turbulence frequency with wind speed
  n.turbBP.frequency.setTargetAtTime(500 + windNorm * 1200, t, 0.1);

  // Whistle appears during high wind + gust
  const whistleVol = Math.max(0, (windNorm - 0.3) * P.gust * 0.12 + gustPulse * 0.08);
  n.whistleGain.gain.setTargetAtTime(whistleVol, t, 0.05);
  // Whistle pitch rises with gust intensity
  n.whistleBP.frequency.setTargetAtTime(1500 + gustPulse * 800 + windNorm * 500, t, 0.05);
}

function toggleAudio() {
  if (!audioCtx) {
    initAudio();
    audioEnabled = true;
  } else if (audioEnabled) {
    audioCtx.suspend();
    audioEnabled = false;
  } else {
    audioCtx.resume();
    audioEnabled = true;
  }
  document.getElementById('btn-sound').textContent = audioEnabled ? '🔊 Sound' : '🔇 Sound';
}

// ─── RENDER LOOP ───
gl.enable(gl.DEPTH_TEST);
gl.enable(gl.CULL_FACE);
gl.cullFace(gl.BACK);

const startTime = performance.now();

function render() {
  const dt = 1 / 60;
  const time = (performance.now() - startTime) * 0.001;

  // ─── INTRO UNFURL ───
  if (unfurlStartTime === null) unfurlStartTime = time;
  const elapsed = time - unfurlStartTime;
  unfurlProgress = Math.min(1.0, elapsed / UNFURL_DURATION);
  // Ease-out curve: fast start, gentle finish
  unfurlProgress = 1.0 - Math.pow(1.0 - unfurlProgress, 3.0);

  // ─── SMOOTH PRESET TRANSITIONS ───
  if (targetP) {
    let allDone = true;
    const lerpFactor = 1.0 - Math.exp(-PRESET_LERP_SPEED * dt);
    for (const key in targetP) {
      const diff = targetP[key] - P[key];
      if (Math.abs(diff) > 0.001) {
        P[key] += diff * lerpFactor;
        allDone = false;
      } else {
        P[key] = targetP[key];
      }
    }
    syncSliders();
    if (allDone) targetP = null;
  }

  // ─── AUTO-ORBIT ───
  const idleTime = performance.now() - lastInteractionTime;
  if (autoOrbit && idleTime > ORBIT_IDLE_DELAY && !mouseDown && !isDraggingCloth) {
    camAngleY += ORBIT_SPEED * dt;
  }

  simulateCloth(dt);
  updateClothBuffers();
  updateAudio();

  const eye = getCamEye();
  const aspect = canvas.width / canvas.height;
  const proj = mat4Perspective(Math.PI / 5, aspect, 0.1, 50);
  const view = mat4LookAt(eye, [0, 0, 0], [0, 1, 0]);

  // ═══ RENDER SCENE TO FBO ═══
  gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFBO.fb);
  gl.viewport(0, 0, sceneFBO.w, sceneFBO.h);
  gl.clearColor(0.02, 0.02, 0.04, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  // ─── Background ───
  gl.disable(gl.DEPTH_TEST);
  gl.useProgram(bgProg);
  const bgPosLoc = gl.getAttribLocation(bgProg, 'aPos');
  gl.bindBuffer(gl.ARRAY_BUFFER, bgPosBuf);
  gl.enableVertexAttribArray(bgPosLoc);
  gl.vertexAttribPointer(bgPosLoc, 2, gl.FLOAT, false, 0, 0);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, skyTex);
  gl.uniform1i(gl.getUniformLocation(bgProg, 'uSkyTex'), 0);
  gl.uniform1f(gl.getUniformLocation(bgProg, 'uTime'), time);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.enable(gl.DEPTH_TEST);

  // ─── Birds ───
  updateBirds(dt);
  gl.useProgram(birdProg);
  gl.uniformMatrix4fv(gl.getUniformLocation(birdProg, 'uProj'), false, proj);
  gl.uniformMatrix4fv(gl.getUniformLocation(birdProg, 'uView'), false, view);
  
  const birdPosLoc = gl.getAttribLocation(birdProg, 'aPos');
  gl.bindBuffer(gl.ARRAY_BUFFER, birdPosBuf);
  gl.enableVertexAttribArray(birdPosLoc);
  gl.vertexAttribPointer(birdPosLoc, 2, gl.FLOAT, false, 0, 0);
  
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  
  for (let i = 0; i < birds.length; i++) {
    const b = birds[i];
    gl.uniform2f(gl.getUniformLocation(birdProg, 'uBirdPos'), b.x, b.y);
    gl.uniform1f(gl.getUniformLocation(birdProg, 'uWingAngle'), b.wingPhase);
    gl.uniform1f(gl.getUniformLocation(birdProg, 'uScale'), b.scale);
    gl.drawArrays(gl.LINE_STRIP, 0, 3);
  }
  
  gl.disable(gl.BLEND);

  // ─── Pole ───
  gl.useProgram(poleProg);
  gl.uniformMatrix4fv(gl.getUniformLocation(poleProg, 'uProj'), false, proj);
  gl.uniformMatrix4fv(gl.getUniformLocation(poleProg, 'uView'), false, view);
  gl.uniform3fv(gl.getUniformLocation(poleProg, 'uEye'), eye);

  const polePosLoc = gl.getAttribLocation(poleProg, 'aPos');
  const poleNormLoc = gl.getAttribLocation(poleProg, 'aNorm');
  gl.bindBuffer(gl.ARRAY_BUFFER, polePosBuf);
  gl.enableVertexAttribArray(polePosLoc);
  gl.vertexAttribPointer(polePosLoc, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, poleNormBuf);
  gl.enableVertexAttribArray(poleNormLoc);
  gl.vertexAttribPointer(poleNormLoc, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, poleIdxBuf);
  gl.drawElements(gl.TRIANGLES, poleIdxCount, gl.UNSIGNED_SHORT, 0);

  // ─── Cloth ───
  gl.useProgram(clothProg);
  gl.uniformMatrix4fv(gl.getUniformLocation(clothProg, 'uProj'), false, proj);
  gl.uniformMatrix4fv(gl.getUniformLocation(clothProg, 'uView'), false, view);
  gl.uniform3fv(gl.getUniformLocation(clothProg, 'uEye'), eye);
  gl.uniform1f(gl.getUniformLocation(clothProg, 'uTime'), time);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, flagTex);
  gl.uniform1i(gl.getUniformLocation(clothProg, 'uTex'), 0);

  const cPosLoc = gl.getAttribLocation(clothProg, 'aPos');
  const cNormLoc = gl.getAttribLocation(clothProg, 'aNorm');
  const cUVLoc = gl.getAttribLocation(clothProg, 'aUV');

  gl.bindBuffer(gl.ARRAY_BUFFER, clothPosBuf);
  gl.enableVertexAttribArray(cPosLoc);
  gl.vertexAttribPointer(cPosLoc, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, clothNormBuf);
  gl.enableVertexAttribArray(cNormLoc);
  gl.vertexAttribPointer(cNormLoc, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, clothUVBuf);
  gl.enableVertexAttribArray(cUVLoc);
  gl.vertexAttribPointer(cUVLoc, 2, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, clothIdxBuf);

  const idxCount = (COLS - 1) * (ROWS - 1) * 6;
  gl.cullFace(gl.BACK);
  gl.drawElements(gl.TRIANGLES, idxCount, gl.UNSIGNED_SHORT, 0);
  gl.cullFace(gl.FRONT);
  gl.drawElements(gl.TRIANGLES, idxCount, gl.UNSIGNED_SHORT, 0);
  gl.cullFace(gl.BACK);

  // ─── Debug wireframe overlay ───
  if (debugMode) {
    gl.useProgram(wireProg);
    gl.uniformMatrix4fv(gl.getUniformLocation(wireProg, 'uProj'), false, proj);
    gl.uniformMatrix4fv(gl.getUniformLocation(wireProg, 'uView'), false, view);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    gl.disable(gl.DEPTH_TEST);

    const wPosLoc = gl.getAttribLocation(wireProg, 'aPos');
    for (let r = 0; r < ROWS; r++) {
      const rowPos = new Float32Array(COLS * 3);
      for (let c = 0; c < COLS; c++) {
        const idx = r * COLS + c;
        rowPos[c * 3] = particles[idx].x;
        rowPos[c * 3 + 1] = particles[idx].y;
        rowPos[c * 3 + 2] = particles[idx].z;
      }
      const tmpBuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, tmpBuf);
      gl.bufferData(gl.ARRAY_BUFFER, rowPos, gl.DYNAMIC_DRAW);
      gl.enableVertexAttribArray(wPosLoc);
      gl.vertexAttribPointer(wPosLoc, 3, gl.FLOAT, false, 0, 0);
      gl.drawArrays(gl.LINE_STRIP, 0, COLS);
      gl.deleteBuffer(tmpBuf);
    }
    for (let c = 0; c < COLS; c++) {
      const colPos = new Float32Array(ROWS * 3);
      for (let r = 0; r < ROWS; r++) {
        const idx = r * COLS + c;
        colPos[r * 3] = particles[idx].x;
        colPos[r * 3 + 1] = particles[idx].y;
        colPos[r * 3 + 2] = particles[idx].z;
      }
      const tmpBuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, tmpBuf);
      gl.bufferData(gl.ARRAY_BUFFER, colPos, gl.DYNAMIC_DRAW);
      gl.enableVertexAttribArray(wPosLoc);
      gl.vertexAttribPointer(wPosLoc, 3, gl.FLOAT, false, 0, 0);
      gl.drawArrays(gl.LINE_STRIP, 0, ROWS);
      gl.deleteBuffer(tmpBuf);
    }
    const pinPos = new Float32Array(ROWS * 3);
    for (let r = 0; r < ROWS; r++) {
      const idx = r * COLS;
      pinPos[r * 3] = particles[idx].x;
      pinPos[r * 3 + 1] = particles[idx].y;
      pinPos[r * 3 + 2] = particles[idx].z;
    }
    const pinBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, pinBuf);
    gl.bufferData(gl.ARRAY_BUFFER, pinPos, gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(wPosLoc);
    gl.vertexAttribPointer(wPosLoc, 3, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.POINTS, 0, ROWS);
    gl.deleteBuffer(pinBuf);

    gl.disable(gl.BLEND);
    gl.enable(gl.DEPTH_TEST);
  }

  // ═══ BLOOM POST-PROCESS ═══
  const bw = bloomFBO1.w, bh = bloomFBO1.h;

  // Helper to draw full-screen quad
  function drawQuad(prog) {
    const posLoc = gl.getAttribLocation(prog, 'aPos');
    gl.bindBuffer(gl.ARRAY_BUFFER, bloomQuadBuf);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  // 1. Extract bright pixels from scene into bloomFBO1 (downsampled)
  gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO1.fb);
  gl.viewport(0, 0, bw, bh);
  gl.disable(gl.DEPTH_TEST);
  gl.useProgram(bloomExtractProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, sceneFBO.tex);
  gl.uniform1i(gl.getUniformLocation(bloomExtractProg, 'uTex'), 0);
  gl.uniform1f(gl.getUniformLocation(bloomExtractProg, 'uThreshold'), 0.35);
  drawQuad(bloomExtractProg);

  // 2. Horizontal blur: bloomFBO1 → bloomFBO2
  gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO2.fb);
  gl.viewport(0, 0, bw, bh);
  gl.useProgram(bloomBlurProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, bloomFBO1.tex);
  gl.uniform1i(gl.getUniformLocation(bloomBlurProg, 'uTex'), 0);
  gl.uniform2f(gl.getUniformLocation(bloomBlurProg, 'uDir'), 1.0, 0.0);
  gl.uniform2f(gl.getUniformLocation(bloomBlurProg, 'uResolution'), bw, bh);
  drawQuad(bloomBlurProg);

  // 3. Vertical blur: bloomFBO2 → bloomFBO1
  gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO1.fb);
  gl.viewport(0, 0, bw, bh);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, bloomFBO2.tex);
  gl.uniform1i(gl.getUniformLocation(bloomBlurProg, 'uTex'), 0);
  gl.uniform2f(gl.getUniformLocation(bloomBlurProg, 'uDir'), 0.0, 1.0);
  gl.uniform2f(gl.getUniformLocation(bloomBlurProg, 'uResolution'), bw, bh);
  drawQuad(bloomBlurProg);

  // 4. Extra blur pass for wider bloom
  gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO2.fb);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, bloomFBO1.tex);
  gl.uniform1i(gl.getUniformLocation(bloomBlurProg, 'uTex'), 0);
  gl.uniform2f(gl.getUniformLocation(bloomBlurProg, 'uDir'), 1.0, 0.0);
  drawQuad(bloomBlurProg);

  gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO1.fb);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, bloomFBO2.tex);
  gl.uniform1i(gl.getUniformLocation(bloomBlurProg, 'uTex'), 0);
  gl.uniform2f(gl.getUniformLocation(bloomBlurProg, 'uDir'), 0.0, 1.0);
  drawQuad(bloomBlurProg);

  // 5. Composite: scene + bloom → screen
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(bloomCompositeProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, sceneFBO.tex);
  gl.uniform1i(gl.getUniformLocation(bloomCompositeProg, 'uScene'), 0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, bloomFBO1.tex);
  gl.uniform1i(gl.getUniformLocation(bloomCompositeProg, 'uBloom'), 1);
  gl.uniform1f(gl.getUniformLocation(bloomCompositeProg, 'uBloomStrength'), 0.6);
  drawQuad(bloomCompositeProg);

  requestAnimationFrame(render);
}

render();
</script>
